services:
  gateway:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    env_file: .env
    depends_on: [postgres, redis]
    volumes: [.:/app]
  nginx:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on: [gateway]
  worker:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    command: php bin/health-worker.php
    env_file: .env
    depends_on: [postgres, redis]
    volumes: [.:/app]
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: geo_proxy
      POSTGRES_USER: geo_proxy
      POSTGRES_PASSWORD: geo_proxy
    volumes: [postgres-data:/var/lib/postgresql/data, ./migrations:/docker-entrypoint-initdb.d:ro]
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes: [redis-data:/data]
  vpn-de-01:
    image: qmcgaw/gluetun:latest
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun:/dev/net/tun]
    environment:
      VPN_SERVICE_PROVIDER: custom
      VPN_TYPE: wireguard
      SERVER_COUNTRIES: Germany
  proxy-de-01:
    image: 3proxy/3proxy:latest
    network_mode: service:vpn-de-01
    volumes: [./docker/3proxy/3proxy.cfg:/etc/3proxy/3proxy.cfg:ro]
    depends_on: [vpn-de-01]
  prometheus:
    image: prom/prometheus:v2.55.0
    ports: ["9090:9090"]
    volumes: [./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro]
  grafana:
    image: grafana/grafana:11.3.0
    ports: ["3000:3000"]
    volumes: [grafana-data:/var/lib/grafana, ./docker/grafana/provisioning:/etc/grafana/provisioning:ro]
volumes:
  postgres-data:
  redis-data:
  grafana-data:
