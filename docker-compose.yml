services:
  gateway:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    env_file: .env
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun:/dev/net/tun]
    environment:
      NORDVPN_COMMAND: nordvpn
      NORDVPN_CURL_COMMAND: curl
    depends_on: [postgres, redis]
    volumes: [.:/app]
  nginx:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on: [gateway]
  worker:
    build: { context: ., dockerfile: docker/php/Dockerfile }
    command: php bin/health-worker.php
    env_file: .env
    depends_on: [postgres, redis]
    volumes: [.:/app]
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: geo_proxy, POSTGRES_USER: geo_proxy, POSTGRES_PASSWORD: geo_proxy }
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
  prometheus:
    image: prom/prometheus:v2.55.0
    ports: ["9090:9090"]
    volumes: [./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro]
  loki:
    image: grafana/loki:3.2.1
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yaml
  grafana:
    image: grafana/grafana:11.3.0
    ports: ["3000:3000"]
    volumes: [grafana-data:/var/lib/grafana, ./docker/grafana/provisioning:/etc/grafana/provisioning:ro]
    depends_on: [prometheus, loki]
volumes: { postgres-data: {}, redis-data: {}, grafana-data: {} }
