apiVersion: apps/v1
kind: Deployment
metadata: { name: geo-proxy-api }
spec:
  replicas: 3
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app: geo-proxy-api } }
  template:
    metadata: { labels: { app: geo-proxy-api } }
    spec:
      containers:
        - name: gateway
          image: ghcr.io/example/geo-proxy-api:latest
          ports: [{ containerPort: 9000 }]
          envFrom: [{ secretRef: { name: geo-proxy-secrets } }]
          readinessProbe: { httpGet: { path: /healthz, port: 9000 }, initialDelaySeconds: 10 }
          livenessProbe: { httpGet: { path: /healthz, port: 9000 }, initialDelaySeconds: 30 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: geo-proxy-api }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: geo-proxy-api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
