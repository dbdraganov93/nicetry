name: CI
on:
  push:
  pull_request:
jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql,intl
      - run: composer install --no-interaction --prefer-dist
      - run: composer cs:check
      - run: composer test
